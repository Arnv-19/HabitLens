version: "3.9"

services:
  # ── PostgreSQL Database ──────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: habitlens_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-habitlens}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-habitlens_secret}
      POSTGRES_DB: ${POSTGRES_DB:-habitlens}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-habitlens}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: habitlens_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-habitlens}:${POSTGRES_PASSWORD:-habitlens_secret}@db:5432/${POSTGRES_DB:-habitlens}
      SECRET_KEY: ${SECRET_KEY:-dev_secret_key_change_in_production}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    volumes:
      - ./backend/uploads:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  # ── Next.js Frontend ─────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: habitlens_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
    name: habitlens_postgres_data
